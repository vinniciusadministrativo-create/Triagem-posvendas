services:
  - type: web
    name: triagem-posvendas
    env: node
    rootDir: backend
    buildCommand: pip3 install -r backend/requirements.txt && cd backend && npm install && cd ../frontend && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
